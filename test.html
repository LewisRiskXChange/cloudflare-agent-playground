<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudflare Agent Playground</title>

  <!--
    Tailwind v3 CDN — includes all plugins (Typography, Forms, etc.)
    required for Streamdown's prose-based typography styling
  -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Streamdown streaming caret / animation styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/streamdown/styles.css" />

  <!--
    Import map — pins React to a single instance so all ESM packages
    (agents, @cloudflare/ai-chat, streamdown) share the same React object
  -->
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@19",
      "react/jsx-runtime":"https://esm.sh/react@19/jsx-runtime",
      "react-dom":        "https://esm.sh/react-dom@19",
      "react-dom/client": "https://esm.sh/react-dom@19/client",
      "agents":           "https://esm.sh/agents@0.8.7",
      "agents/react":     "https://esm.sh/agents@0.8.7/react",
      "agents/client":    "https://esm.sh/agents@0.8.7/client"
    }
  }
  </script>

  <style>
    /* Auto-grow textarea */
    textarea { field-sizing: content; }
  </style>
</head>
<body class="h-screen overflow-hidden bg-gray-50">
  <div id="root" class="h-full"></div>

  <script type="module">
    import htm from "https://esm.sh/htm"
    import React, { useState, useRef, useEffect, useCallback } from "react"
    import { createRoot } from "react-dom/client"
    import { useAgent } from "agents/react"
    import { useAgentChat } from "https://esm.sh/@cloudflare/ai-chat@0.2.6/react"
    import { Streamdown } from "https://esm.sh/streamdown"
    import { code }       from "https://esm.sh/@streamdown/code"

    const html = htm.bind(React.createElement)
    const STORAGE_KEY = "cf-agent-playground-config"

    // ─── helpers ────────────────────────────────────────────────────────────────

    function loadConfig() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") }
      catch { return null }
    }

    function saveConfig(cfg) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg))
    }

    function extractText(message) {
      return (message.parts ?? [])
        .filter(p => p.type === "text")
        .map(p => p.text)
        .join("") || message.content || ""
    }

    // ─── ConfigScreen ────────────────────────────────────────────────────────────

    function ConfigScreen({ onConnect }) {
      const saved = loadConfig()
      const [url,       setUrl]       = useState(saved?.url       ?? "https://")
      const [agentName, setAgentName] = useState(saved?.agentName ?? "NovaAgent")
      const [sessionId, setSessionId] = useState(saved?.sessionId ?? "test-session-1")
      const [error,     setError]     = useState("")

      function handleSubmit(e) {
        e.preventDefault()
        try {
          new URL(url)
          const cfg = { url, agentName, sessionId }
          saveConfig(cfg)
          onConnect(cfg)
        } catch {
          setError("Enter a valid URL including https://")
        }
      }

      return html`
        <div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
          <div class="w-full max-w-md">

            <div class="text-center mb-8">
              <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-blue-600 mb-4">
                <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
              </div>
              <h1 class="text-2xl font-bold text-gray-900">Agent Playground</h1>
              <p class="text-sm text-gray-500 mt-1">Connect to any Cloudflare AIChatAgent</p>
            </div>

            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 space-y-4">
              <form onSubmit=${handleSubmit} class="space-y-4">

                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1.5">Worker URL</label>
                  <input
                    type="url"
                    value=${url}
                    onInput=${e => setUrl(e.target.value)}
                    placeholder="https://nova-staging.example.workers.dev"
                    class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    required
                  />
                </div>

                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Agent Class</label>
                    <input
                      type="text"
                      value=${agentName}
                      onInput=${e => setAgentName(e.target.value)}
                      placeholder="NovaAgent"
                      class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Session ID</label>
                    <input
                      type="text"
                      value=${sessionId}
                      onInput=${e => setSessionId(e.target.value)}
                      placeholder="test-session-1"
                      class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                      required
                    />
                  </div>
                </div>

                <p class="text-xs text-gray-400 leading-relaxed">
                  Each Session ID is a unique Durable Object instance with its own persisted message history.
                </p>

                ${error && html`
                  <div class="bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                    <p class="text-sm text-red-600">${error}</p>
                  </div>
                `}

                <button
                  type="submit"
                  class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors"
                >
                  Connect →
                </button>
              </form>
            </div>

          </div>
        </div>
      `
    }

    // ─── MessageBubble ───────────────────────────────────────────────────────────

    function MessageBubble({ message, isAnimating }) {
      const isUser = message.role === "user"
      const text   = extractText(message)

      if (isUser) {
        return html`
          <div class="flex justify-end mb-3">
            <div class="max-w-[75%] bg-blue-600 text-white rounded-2xl rounded-tr-md px-4 py-2.5 text-sm leading-relaxed whitespace-pre-wrap">
              ${text}
            </div>
          </div>
        `
      }

      return html`
        <div class="flex justify-start mb-3">
          <div class="max-w-[80%] bg-white border border-gray-100 rounded-2xl rounded-tl-md px-4 py-3 shadow-sm">
            <div class="prose prose-sm max-w-none text-gray-800">
              <${Streamdown} plugins=${{ code }} isAnimating=${isAnimating}>
                ${text}
              </${Streamdown}>
            </div>
          </div>
        </div>
      `
    }

    // ─── TypingIndicator ─────────────────────────────────────────────────────────

    function TypingIndicator({ agentName }) {
      return html`
        <div class="flex justify-start mb-3">
          <div class="bg-white border border-gray-100 rounded-2xl rounded-tl-md px-4 py-3 shadow-sm flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0ms"></span>
            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:150ms"></span>
            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay:300ms"></span>
          </div>
        </div>
      `
    }

    // ─── ChatScreen ──────────────────────────────────────────────────────────────

    function ChatScreen({ url, agentName, sessionId, onDisconnect }) {
      const [input, setInput] = useState("")
      const bottomRef         = useRef(null)
      const inputRef          = useRef(null)

      const agent = useAgent({
        agent: agentName,
        name:  sessionId,
        host:  new URL(url).host,
      })

      const { messages, sendMessage, clearHistory, status } = useAgentChat({ agent })

      const isLoading   = status === "submitted" || status === "streaming"
      const isStreaming  = status === "streaming"
      const lastMsg      = messages[messages.length - 1]
      const showTyping   = status === "submitted"

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" })
      }, [messages, showTyping])

      const submit = useCallback(() => {
        const text = input.trim()
        if (!text || isLoading) return
        sendMessage({ role: "user", parts: [{ type: "text", text }] })
        setInput("")
        setTimeout(() => inputRef.current?.focus(), 0)
      }, [input, isLoading, sendMessage])

      function handleKeyDown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault()
          submit()
        }
      }

      return html`
        <div class="h-screen flex flex-col">

          <!-- Header -->
          <div class="bg-white border-b border-gray-200 px-5 py-3 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-2.5 min-w-0">
              <span class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0"></span>
              <span class="text-sm font-semibold text-gray-900 flex-shrink-0">${agentName}</span>
              <span class="text-gray-300 flex-shrink-0">/</span>
              <span class="text-sm text-gray-500 font-mono truncate">${sessionId}</span>
              <span class="hidden sm:block text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full font-mono flex-shrink-0 truncate">
                ${new URL(url).hostname}
              </span>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0 ml-4">
              <button
                onClick=${clearHistory}
                class="text-xs text-gray-400 hover:text-red-500 transition-colors hidden sm:block"
              >
                Clear history
              </button>
              <button
                onClick=${onDisconnect}
                class="text-xs text-gray-500 hover:text-gray-800 transition-colors border border-gray-200 rounded-md px-2.5 py-1"
              >
                Change config
              </button>
            </div>
          </div>

          <!-- Messages -->
          <div class="flex-1 overflow-y-auto px-5 py-4">
            ${messages.length === 0 && !isLoading && html`
              <div class="h-full flex flex-col items-center justify-center text-center">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center mb-3">
                  <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                  </svg>
                </div>
                <p class="text-sm font-medium text-gray-600">Start a conversation</p>
                <p class="text-xs text-gray-400 mt-1">Type a message below to chat with ${agentName}</p>
              </div>
            `}

            ${messages.map((msg, i) => html`
              <${MessageBubble}
                key=${msg.id || String(i)}
                message=${msg}
                isAnimating=${isStreaming && msg.role === "assistant" && i === messages.length - 1}
              />
            `)}

            ${showTyping && html`<${TypingIndicator} agentName=${agentName} />`}

            <div ref=${bottomRef} />
          </div>

          <!-- Input -->
          <div class="flex-shrink-0 bg-white border-t border-gray-200 px-4 py-3">
            <div class="flex gap-2 items-end">
              <textarea
                ref=${inputRef}
                value=${input}
                onInput=${e => setInput(e.target.value)}
                onKeyDown=${handleKeyDown}
                placeholder=${"Message " + agentName + "… (Enter to send, Shift+Enter for newline)"}
                rows="1"
                disabled=${isLoading}
                class="flex-1 px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none disabled:opacity-50 disabled:bg-gray-50 transition-colors"
                style="min-height:42px; max-height:160px"
              ></textarea>
              <button
                onClick=${submit}
                disabled=${isLoading || !input.trim()}
                class="flex-shrink-0 h-[42px] bg-blue-600 text-white px-4 rounded-xl text-sm font-medium hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
              >
                Send
              </button>
            </div>
          </div>

        </div>
      `
    }

    // ─── App ─────────────────────────────────────────────────────────────────────

    function App() {
      const [config, setConfig] = useState(null)
      return config
        ? html`<${ChatScreen} ...${config} onDisconnect=${() => setConfig(null)} />`
        : html`<${ConfigScreen} onConnect=${setConfig} />`
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`)
  </script>
</body>
</html>
